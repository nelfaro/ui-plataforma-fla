name: Deploy to EasyPanel

on:
  push:
    branches:
      - main
      - production
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install --no-audit

      # 4. Lint
      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      # 5. Build
      - name: Build with Vite
        run: npm run build

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production')

    steps:
      - uses: actions/checkout@v4

      # EasyPanel auto-detects pushed code and redeploys
      # This workflow just ensures quality gates before deploy
      - name: Deployment triggered
        run: echo "Code pushed to main/production. EasyPanel will auto-deploy."
